<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="my-div">
      <main class="card">
        <div class="tabs" role="tablist" aria-label="App sections">
          <button class="tab-btn active" type="button" data-tab="password-tab">
            Password Generator
          </button>
          <button class="tab-btn" type="button" data-tab="todo-tab">
            TodoList
          </button>
        </div>

        <section class="tab-panel active" id="password-tab" data-panel>
          <h1 class="my-title">Password Generator</h1>

          <label class="field">
            <span>Length: <strong id="length-value">12</strong></span>
            <input id="length" type="range" min="4" max="32" value="12" />
          </label>

          <label class="option">
            <input id="uppercase" type="checkbox" checked />
            <span>Include uppercase letters</span>
          </label>

          <label class="option">
            <input id="numbers" type="checkbox" checked />
            <span>Include numbers</span>
          </label>

          <label class="option">
            <input id="symbols" type="checkbox" checked />
            <span>Include symbols</span>
          </label>

          <div class="result-row">
            <input id="password" type="text" readonly />
            <button id="copy-btn" type="button">Copy</button>
          </div>

          <button id="generate-btn" class="generate-btn" type="button">
            Generate password
          </button>
        </section>

        <section class="tab-panel" id="todo-tab" data-panel>
          <h1 class="my-title">TodoList</h1>

          <form class="todo-form" id="todo-form">
            <input
              id="todo-input"
              type="text"
              placeholder="Add a new task"
              maxlength="60"
            />
            <button class="generate-btn" type="submit">Add task</button>
          </form>

          <ul class="todo-list" id="todo-list"></ul>
        </section>
      </main>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
